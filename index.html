<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسئلة نظرية الحلقات - Ring Theory Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --white: #f8fafc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(124,58,237,0.05) 0%, transparent 50%);
  }

  .header {
    background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0f1d35 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header h1 {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .header p { color: var(--muted); font-size: 13px; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
  }

  .stat .num { font-family: 'JetBrains Mono', monospace; font-size: 15px; }
  .stat.total .num { color: var(--accent); }
  .stat.correct .num { color: var(--green); }
  .stat.wrong .num { color: var(--red); }
  .stat.unanswered .num { color: var(--gold); }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    flex-wrap: wrap;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { background: var(--border); }
  .btn.active { background: var(--accent2); border-color: var(--accent2); color: white; }
  .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.success { background: var(--green); border-color: var(--green); color: white; }
  .btn.danger { background: var(--red); border-color: var(--red); color: white; }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 16px;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-badge {
    background: var(--accent2);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    margin-right: auto;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .question-card:hover::before { opacity: 1; }

  .question-card.answered-correct {
    border-color: var(--green);
    background: rgba(16, 185, 129, 0.04);
  }

  .question-card.answered-wrong {
    border-color: var(--red);
    background: rgba(239, 68, 68, 0.04);
  }

  .question-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .q-type {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .q-type.tf { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
  .q-type.mc { background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); }
  .q-type.fill { background: rgba(245,158,11,0.1); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }

  .q-topic {
    font-size: 10px;
    color: var(--muted);
    margin-right: auto;
  }

  .question-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.7;
    margin-bottom: 16px;
    color: var(--white);
    direction: rtl;
  }

  .math {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
    direction: ltr;
    display: inline-block;
  }

  /* True/False */
  .tf-options {
    display: flex;
    gap: 10px;
  }

  .tf-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tf-btn:hover:not(:disabled) { background: var(--border); transform: translateY(-1px); }
  .tf-btn:disabled { cursor: default; }
  .tf-btn.selected-correct { background: rgba(16,185,129,0.15); border-color: var(--green); color: var(--green); }
  .tf-btn.selected-wrong { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
  .tf-btn.reveal-correct { background: rgba(16,185,129,0.1); border-color: var(--green); color: var(--green); }

  /* MCQ */
  .mc-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .mc-opt {
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: right;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mc-opt:hover:not(:disabled) { border-color: var(--accent2); background: rgba(124,58,237,0.08); transform: translateX(-2px); }
  .mc-opt:disabled { cursor: default; }
  .mc-opt.selected-correct { background: rgba(16,185,129,0.1); border-color: var(--green); color: var(--green); }
  .mc-opt.selected-wrong { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }
  .mc-opt.reveal-correct { background: rgba(16,185,129,0.08); border-color: var(--green); color: var(--green); }

  .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Fill in blank */
  .fill-wrapper {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .fill-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    direction: rtl;
    outline: none;
    transition: border-color 0.2s;
  }

  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct { border-color: var(--green); background: rgba(16,185,129,0.05); color: var(--green); }
  .fill-input.wrong { border-color: var(--red); background: rgba(239,68,68,0.05); color: var(--red); }
  .fill-input:disabled { cursor: default; }

  .check-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent2);
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .check-btn:hover:not(:disabled) { opacity: 0.85; }
  .check-btn:disabled { background: var(--border); cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .feedback.show { display: flex; }
  .feedback.correct { background: rgba(16,185,129,0.1); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
  .feedback.wrong { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
  }

  .result-overlay.show { display: flex; }

  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
  }

  .result-score {
    font-size: 72px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 16px 0;
  }

  .result-label { color: var(--muted); font-size: 14px; margin-bottom: 8px; }
  .result-message { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 20px; }

  .result-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .rb-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
  }

  .rb-item .num { font-size: 28px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
  .rb-item .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .rb-item.c .num { color: var(--green); }
  .rb-item.w .num { color: var(--red); }

  .progress-ring {
    position: relative;
    display: inline-block;
    margin: 0 auto;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    justify-content: center;
    flex-wrap: wrap;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>🔢 أسئلة نظرية الحلقات – Ring Theory</h1>
  <p>Prof. Nada Khalid | Tikrit University — أسئلة صح/خطأ، اختيار من متعدد، فراغات</p>
</div>

<div class="stats-bar">
  <div class="stat total">📋 إجمالي الأسئلة: <span class="num" id="totalCount">0</span></div>
  <div class="stat correct">✅ صحيح: <span class="num" id="correctCount">0</span></div>
  <div class="stat wrong">❌ خطأ: <span class="num" id="wrongCount">0</span></div>
  <div class="stat unanswered">⏳ متبقي: <span class="num" id="unansweredCount">0</span></div>
</div>

<div class="controls">
  <button class="btn primary" onclick="showAll()">📚 كل الأسئلة</button>
  <button class="btn" onclick="filterType('tf')" id="btnTF">✓✗ صح/خطأ</button>
  <button class="btn" onclick="filterType('mc')" id="btnMC">🔵 اختيار متعدد</button>
  <button class="btn" onclick="filterType('fill')" id="btnFill">✏️ فراغات</button>
  <button class="btn danger" onclick="resetAll()">🔄 إعادة تعيين</button>
  <button class="btn success" onclick="showResults()">📊 النتيجة النهائية</button>
</div>

<div class="container" id="questionsContainer"></div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-label">نتيجتك النهائية</div>
    <div class="result-score" id="resScore">0%</div>
    <div class="result-message" id="resMessage"></div>
    <div class="result-breakdown">
      <div class="rb-item c"><div class="num" id="resCorrect">0</div><div class="label">✅ إجابات صحيحة</div></div>
      <div class="rb-item w"><div class="num" id="resWrong">0</div><div class="label">❌ إجابات خاطئة</div></div>
    </div>
    <button class="btn primary" onclick="document.getElementById('resultOverlay').classList.remove('show')" style="width:100%;padding:12px;">إغلاق</button>
  </div>
</div>

<script>
const questions = [

  // ============ صح / خطأ ============

  { id:1, type:'tf', topic:'تعريف الحلقة', q:'الأعداد الطبيعية مع عمليتي الجمع والضرب العاديين تشكّل حلقة.', ans:false, exp:'الأعداد الطبيعية ليست حلقة لأن العنصر المحايد للجمع (0) وعنصر النظير الجمعي غير موجودَين في ℕ.' },

  { id:2, type:'tf', topic:'تعريف الحلقة', q:'الحلقة (Z, +, .) هي حلقة تبادلية مع محايد ضربي.', ans:true, exp:'Z حلقة تبادلية مع محايد ضربي يساوي 1.' },

  { id:3, type:'tf', topic:'الحلقات التبادلية', q:'كل حقل (Field) هو حلقة تبادلية مع محايد ضربي.', ans:true, exp:'كل حقل يحقق جميع خواص الحلقة التبادلية مع محايد ضربي.' },

  { id:4, type:'tf', topic:'الحلقات التبادلية', q:'كل حلقة تبادلية هي حقل.', ans:false, exp:'مثلاً (Z, +, .) حلقة تبادلية مع محايد لكنها ليست حقلاً لأن 2 لا يملك نظيراً ضربياً في Z.' },

  { id:5, type:'tf', topic:'خواص الحلقات', q:'في أي حلقة (R, +, .)، يتحقق a.0 = 0 لكل a ∈ R.', ans:true, exp:'a.0 = a.(0+0) = a.0 + a.0 ← a.0 = 0.' },

  { id:6, type:'tf', topic:'خواص الحلقات', q:'في أي حلقة، (-a)(-b) = -(ab) لكل a, b ∈ R.', ans:false, exp:'(-a)(-b) = ab (ليس -(ab)). بالحساب: (-a)(-b) = -(a(-b)) = -(-(ab)) = ab.' },

  { id:7, type:'tf', topic:'الأصفار القسمية', q:'في حلقة Z₄، العنصر 2̄ هو صفر قسمي.', ans:true, exp:'لأن 2̄ ×₄ 2̄ = 0̄، وكلاهما غير صفري.' },

  { id:8, type:'tf', topic:'الأصفار القسمية', q:'في حلقة Z₅، يوجد صفر قسمي.', ans:false, exp:'Z₅ حلقة تكاملية (integral domain) لأن 5 عدد أولي، إذن لا توجد أصفار قسمية.' },

  { id:9, type:'tf', topic:'الأصفار القسمية', q:'كل عنصر قابل للعكس في حلقة تبادلية مع محايد ليس صفراً قسمياً.', ans:true, exp:'إذا كان a قابلاً للعكس وa.b = 0، فبضرب a⁻¹ نحصل على b = 0، تناقض.' },

  { id:10, type:'tf', topic:'الساحة', q:'(Z₆, +₆, .₆) ساحة (Integral Domain).', ans:false, exp:'Z₆ تحتوي على أصفار قسمية مثل 2̄ × 3̄ = 0̄، لذا ليست ساحة.' },

  { id:11, type:'tf', topic:'الساحة', q:'Zₙ هي ساحة (Integral Domain) إذا وفقط إذا كان n عدداً أولياً.', ans:true, exp:'هذه نظرية مبرهنة في المادة.' },

  { id:12, type:'tf', topic:'الحقل', q:'Z₇ حقل (Field).', ans:true, exp:'لأن 7 عدد أولي، Z₇ ساحة تكاملية وهي متناهية → هي حقل.' },

  { id:13, type:'tf', topic:'الحقل', q:'كل ساحة تكاملية متناهية هي حقل.', ans:true, exp:'نظرية معروفة: كل ساحة تكاملية متناهية هي حقل.' },

  { id:14, type:'tf', topic:'الحلقات الجزئية', q:'المجموعة Ze (الأعداد الزوجية) هي حلقة جزئية من (Z, +, .).', ans:true, exp:'Ze مغلقة تحت الطرح والضرب، وتحقق شروط الحلقة الجزئية.' },

  { id:15, type:'tf', topic:'الحلقات الجزئية', q:'تقاطع حلقتين جزئيتين من حلقة R هو حلقة جزئية من R.', ans:true, exp:'مبرهنة في الكتاب: تقاطع أي مجموعة من الحلقات الجزئية هو حلقة جزئية.' },

  { id:16, type:'tf', topic:'الحلقات الجزئية', q:'اتحاد حلقتين جزئيتين من حلقة R هو دائماً حلقة جزئية.', ans:false, exp:'ليس بالضرورة. مثلاً A={0,±2,±4,...} و B={0,±3,±6,...} في Z: الاتحاد ليس حلقة جزئية لأن 2+3=5 ∉ A∪B.' },

  { id:17, type:'tf', topic:'المثاليات', q:'كل مثالي (Ideal) هو حلقة جزئية.', ans:true, exp:'المثالي يحقق شروط الحلقة الجزئية (مغلق تحت الطرح والضرب) بالإضافة إلى شرط الامتصاص.' },

  { id:18, type:'tf', topic:'المثاليات', q:'كل حلقة جزئية هي مثالي.', ans:false, exp:'مثلاً Z حلقة جزئية من R لكنها ليست مثالياً لأن 5 ∈ Z و 1/3 ∈ R لكن 5×(1/3) = 5/3 ∉ Z.' },

  { id:19, type:'tf', topic:'المثاليات', q:'إذا كانت I مثالياً في R وكان 1 ∈ I، فإن I = R.', ans:true, exp:'لأي r ∈ R: r = r.1 ∈ I إذن R ⊆ I ومع I ⊆ R نحصل I = R.' },

  { id:20, type:'tf', topic:'المثاليات', q:'أي حقل F له مثاليان فقط هما {0} و F نفسه.', ans:true, exp:'لأن كل عنصر غير صفري في الحقل قابل للعكس، فإذا 0 ≠ a ∈ I فإن I = F.' },

  { id:21, type:'tf', topic:'المثاليات الأعظمية', q:'المثالي الأعظم (Maximal Ideal) في حلقة Z هو المثالي id(p) حيث p عدد أولي.', ans:true, exp:'مبرهنة: id(n) مثالي أعظم في Z ↔ n عدد أولي.' },

  { id:22, type:'tf', topic:'المثاليات الأولية', q:'كل مثالي أعظم هو مثالي أولي (Prime Ideal).', ans:true, exp:'في الحلقات التبادلية مع محايد، كل مثالي أعظم هو مثالي أولي.' },

  { id:23, type:'tf', topic:'المثاليات الأولية', q:'كل مثالي أولي هو مثالي أعظم.', ans:false, exp:'{0} في Z مثالي أولي لكنه ليس مثالياً أعظم لأن id(2) يحتوي عليه: {0} ⊊ id(2) ⊊ Z.' },

  { id:24, type:'tf', topic:'المثاليات الرئيسية', q:'(Z, +, .) حلقة مثاليات رئيسية (P.I.R).', ans:true, exp:'كل مثالي في Z من الشكل id(n) لعدد صحيح n، وهذا يعني كل مثالياته رئيسية.' },

  { id:25, type:'tf', topic:'حلقة الحاصل', q:'إذا كانت I مثالياً أعظم في R، فإن R/I حقل.', ans:true, exp:'مبرهنة أساسية: I مثالي أعظم ↔ R/I حقل.' },

  { id:93, type:'fill', topic:'المثاليات الرئيسية', q:'الحلقة R تسمى حلقة مثاليات رئيسية (P.I.R) إذا كان كل مثالي فيها ___________', ans:'رئيسياً', exp:'تعريف حلقة المثاليات الرئيسية.' },

  { id:94, type:'fill', topic:'حلقة الحاصل', q:'الحلقة Z₄ مقسومة على I = {0̄, 2̄} تعطي حلقة مماثلة لـ ___________', ans:'Z₂', exp:'Z₄/I ≅ Z₂ لأن |Z₄/I| = 2.' },

  { id:95, type:'fill', topic:'التشاكل الحلقي', q:'التشاكل الحلقي الذي هو حقن وشامل في نفس الوقت يسمى ___________', ans:'إسومورفية', exp:'Isomorphism = إسومورفية = تشاكل حلقي حقن وشامل.' },

];

let answered = {};
let currentFilter = 'all';

function getFilteredQuestions() {
  if (currentFilter === 'all') return questions;
  return questions.filter(q => q.type === currentFilter);
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  
  const filtered = getFilteredQuestions();
  
  // Group by topic
  const topics = {};
  filtered.forEach(q => {
    if (!topics[q.topic]) topics[q.topic] = [];
    topics[q.topic].push(q);
  });

  let typeMap = {tf:'صح / خطأ',mc:'اختيار من متعدد',fill:'فراغات'};

  Object.entries(topics).forEach(([topic, qs]) => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-title">📌 ${topic} <span class="section-badge">${qs.length} سؤال</span></div>`;
    container.appendChild(sec);

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `card-${q.id}`;

      const state = answered[q.id];
      if (state === 'correct') card.classList.add('answered-correct');
      else if (state === 'wrong') card.classList.add('answered-wrong');

      const typeLabel = {tf:'صح / خطأ',mc:'اختيار متعدد',fill:'فراغ'}[q.type];
      const typeClass = {tf:'tf',mc:'mc',fill:'fill'}[q.type];
      const isAnswered = state !== undefined;

      let inner = `
        <div class="question-meta">
          <span class="q-num">Q${q.id}</span>
          <span class="q-type ${typeClass}">${typeLabel}</span>
          <span class="q-topic">${q.topic}</span>
        </div>
        <div class="question-text">${q.q}</div>
      `;

      if (q.type === 'tf') {
        inner += `<div class="tf-options">`;
        ['صحيح ✓', 'خطأ ✗'].forEach((label, i) => {
          const val = i === 0;
          let cls = '';
          if (isAnswered) {
            if (val === q.ans && (state === 'correct' || state === 'wrong')) cls = 'reveal-correct';
            if (state === 'correct' && val === q.ans) cls = 'selected-correct';
            if (state === 'wrong' && val !== q.ans) cls = 'selected-wrong';
          }
          inner += `<button class="tf-btn ${cls}" ${isAnswered?'disabled':''} onclick="answerTF(${q.id}, ${val})">${label}</button>`;
        });
        inner += `</div>`;
      }
      else if (q.type === 'mc') {
        inner += `<div class="mc-options">`;
        q.opts.forEach((opt, i) => {
          let cls = '';
          if (isAnswered) {
            if (i === q.ans) cls = 'reveal-correct';
            if (state === 'correct' && i === q.ans) cls = 'selected-correct';
            if (state === 'wrong' && i !== q.ans) cls = '';
          }
          inner += `<button class="mc-opt ${cls}" ${isAnswered?'disabled':''} onclick="answerMC(${q.id}, ${i})">
            <span class="opt-letter">${String.fromCharCode(65+i)}</span>
            ${opt}
          </button>`;
        });
        inner += `</div>`;
      }
      else if (q.type === 'fill') {
        const fillVal = answered[`fill_${q.id}`] || '';
        const fillCls = state === 'correct' ? 'correct' : state === 'wrong' ? 'wrong' : '';
        inner += `<div class="fill-wrapper">
          <input class="fill-input ${fillCls}" id="fill-${q.id}" type="text" placeholder="اكتب إجابتك هنا..." 
            value="${fillVal}" ${isAnswered?'disabled':''}
            onkeydown="if(event.key==='Enter') checkFill(${q.id})">
          <button class="check-btn" id="fillbtn-${q.id}" ${isAnswered?'disabled':''} onclick="checkFill(${q.id})">تحقق</button>
        </div>`;
      }

      if (isAnswered) {
        const fb = state === 'correct'
          ? `<div class="feedback correct show">✅ إجابة صحيحة! ${q.exp}</div>`
          : `<div class="feedback wrong show">❌ إجابة خاطئة. ${q.exp}</div>`;
        inner += fb;
      } else {
        inner += `<div class="feedback" id="fb-${q.id}"></div>`;
      }

      card.innerHTML = inner;
      container.appendChild(card);
    });
  });

  updateStats();
}

function answerTF(id, val) {
  const q = questions.find(x => x.id === id);
  const correct = (val === q.ans);
  answered[id] = correct ? 'correct' : 'wrong';
  renderQuestions();
  scrollToCard(id);
}

function answerMC(id, idx) {
  const q = questions.find(x => x.id === id);
  const correct = (idx === q.ans);
  answered[id] = correct ? 'correct' : 'wrong';
  renderQuestions();
  scrollToCard(id);
}

function checkFill(id) {
  const q = questions.find(x => x.id === id);
  const input = document.getElementById(`fill-${id}`);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  answered[`fill_${id}`] = val;
  const correct = val.toLowerCase().includes(q.ans.toLowerCase()) || q.ans.toLowerCase().includes(val.toLowerCase());
  answered[id] = correct ? 'correct' : 'wrong';
  renderQuestions();
  scrollToCard(id);
}

function scrollToCard(id) {
  setTimeout(() => {
    const el = document.getElementById(`card-${id}`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function updateStats() {
  const total = questions.length;
  let correct = 0, wrong = 0;
  questions.forEach(q => {
    if (answered[q.id] === 'correct') correct++;
    else if (answered[q.id] === 'wrong') wrong++;
  });
  document.getElementById('totalCount').textContent = total;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('unansweredCount').textContent = total - correct - wrong;
}

function filterType(type) {
  currentFilter = type;
  ['btnTF','btnMC','btnFill'].forEach(id => document.getElementById(id).classList.remove('active'));
  const map = {tf:'btnTF',mc:'btnMC',fill:'btnFill'};
  document.getElementById(map[type]).classList.add('active');
  renderQuestions();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showAll() {
  currentFilter = 'all';
  ['btnTF','btnMC','btnFill'].forEach(id => document.getElementById(id).classList.remove('active'));
  renderQuestions();
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetAll() {
  if (!confirm('هل تريد إعادة تعيين جميع الإجابات؟')) return;
  answered = {};
  renderQuestions();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showResults() {
  let correct = 0, wrong = 0;
  questions.forEach(q => {
    if (answered[q.id] === 'correct') correct++;
    else if (answered[q.id] === 'wrong') wrong++;
  });
  const total = questions.length;
  const answered_count = correct + wrong;
  const pct = answered_count > 0 ? Math.round(correct/answered_count*100) : 0;
  
  document.getElementById('resScore').textContent = pct + '%';
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = wrong;
  
  let msg = '';
  if (pct >= 90) msg = '🏆 ممتاز! أداء رائع جداً';
  else if (pct >= 75) msg = '🎉 جيد جداً! استمر';
  else if (pct >= 60) msg = '👍 جيد، يمكنك التحسين';
  else if (pct >= 50) msg = '📚 مقبول، راجع المادة';
  else msg = '💪 حاول مرة أخرى بعد المراجعة';
  
  document.getElementById('resMessage').textContent = msg;
  document.getElementById('resultOverlay').classList.add('show');
}

// Init
renderQuestions();
</script>
</body>
</html>
